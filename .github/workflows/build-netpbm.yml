name: Build Netpbm (UCRT64)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    env:
      NETPBM_VERSION: "10.86.49"
      ARTIFACT_NAME: "netpbm-ucrt64"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-libtiff
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-xz
            mingw-w64-ucrt-x86_64-libxml2

      - name: Download Netpbm
        run: |
          curl -L \
            -o netpbm.tgz \
            https://netix.dl.sourceforge.net/project/netpbm/super_stable/${NETPBM_VERSION}/netpbm-${NETPBM_VERSION}.tgz
      - name: Extract sources
        run: |
          tar -xf netpbm.tgz
          mv netpbm-* netpbm-src

      - name: Configure build
        working-directory: netpbm-src
        run: |
          cp config.mk.in config.mk

          cat >> config.mk <<EOF
          #### Lines below were added by GitHub Actions builder ####
          DEFAULT_TARGET = nonmerge
          NETPBMLIBTYPE=unixstatic
          NETPBMLIBSUFFIX=a
          DONT_HAVE_PROCESS_MGMT = Y
          STATICLIB_TOO=N
          EXE = .exe
          OMIT_NETWORK = Y
          SYMLINK = ln -s
          DLLVER=$(NETPBM_MAJOR_RELEASE)
          LDSHLIB = -shared -Wl,--image-base=0x10000000 -Wl,--enable-auto-import
          MSVCRT = Y
          WINICON_OBJECT = $(BUILDDIR)/icon/netpbm.o
          LINKERISCOMPILER = Y
          TIFFLIB = libtiff.dll
          JPEGLIB = libjpeg.dll
          PNGHDR_DIR = USE_PKG_CONFIG.a
          PNGLIB = USE_PKG_CONFIG.a
          ZLIB = libz.dll
          X11HDR_DIR = USE_PKGCONFIG.a
          X11LIB = USE_PKGCONFIG.a
          NETPBM_DOCURL = http://netpbm.sourceforge.net/doc/
          WANT_SSE = Y
          EOF

      - name: Build Netpbm
        working-directory: netpbm-src
        run: |
          make -j$(nproc)

      - name: Prepare package
        run: |
          mkdir package

          cp -r netpbm-src/bin package/
          cp -r netpbm-src/lib package/
          cp -r netpbm-src/include package/

      - name: Create ZIP archive
        run: |
          zip -r "${ARTIFACT_NAME}.zip" package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: netpbm-ucrt64
          path: netpbm-ucrt64.zip

      - name: Publish Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: netpbm-ucrt64.zip
